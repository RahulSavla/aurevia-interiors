<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B5B45"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B59A"/>
      <stop offset="100%" stop-color="#A89880"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A6A52"/>
      <stop offset="100%" stop-color="#5C4E3C"/>
    </linearGradient>
  </defs>
  <!-- Room -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Back wall -->
  <rect x="100" y="50" width="1000" height="450" fill="url(#wall)" rx="4"/>
  <!-- Wall stains/marks -->
  <circle cx="300" cy="200" r="25" fill="#B8A88A" opacity="0.4"/>
  <circle cx="800" cy="150" r="18" fill="#B8A88A" opacity="0.3"/>
  <rect x="500" y="300" width="60" height="3" fill="#B8A88A" opacity="0.4" rx="1"/>
  <!-- Floor -->
  <path d="M0 500 L100 500 L1100 500 L1200 500 L1200 750 L0 750Z" fill="url(#floor)"/>
  <!-- Floor lines (old tiles) -->
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#6B5B45" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="660" x2="1200" y2="660" stroke="#6B5B45" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="500" x2="300" y2="750" stroke="#6B5B45" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="500" x2="600" y2="750" stroke="#6B5B45" stroke-width="1" opacity="0.3"/>
  <line x1="900" y1="500" x2="900" y2="750" stroke="#6B5B45" stroke-width="1" opacity="0.3"/>
  <!-- Old window -->
  <rect x="450" y="100" width="300" height="250" fill="#94A3B8" rx="4" opacity="0.6"/>
  <line x1="600" y1="100" x2="600" y2="350" stroke="#8B7355" stroke-width="6"/>
  <line x1="450" y1="225" x2="750" y2="225" stroke="#8B7355" stroke-width="6"/>
  <rect x="446" y="96" width="308" height="258" fill="none" stroke="#8B7355" stroke-width="8" rx="4"/>
  <!-- Old sofa -->
  <rect x="150" y="380" width="350" height="120" fill="#7A6652" rx="12"/>
  <rect x="150" y="360" width="350" height="40" fill="#6B5942" rx="8"/>
  <rect x="140" y="370" width="30" height="130" fill="#6B5942" rx="6"/>
  <rect x="480" y="370" width="30" height="130" fill="#6B5942" rx="6"/>
  <!-- Old table -->
  <rect x="550" y="430" width="180" height="70" fill="#5C4E3C" rx="4"/>
  <rect x="560" y="500" width="8" height="40" fill="#4A3E30"/>
  <rect x="712" y="500" width="8" height="40" fill="#4A3E30"/>
  <!-- Old lamp -->
  <rect x="820" y="340" width="12" height="160" fill="#8B7355"/>
  <ellipse cx="826" cy="340" rx="40" ry="25" fill="#A89070" opacity="0.8"/>
  <!-- Fluorescent light -->
  <rect x="400" y="55" width="400" height="12" fill="#D4D4D4" rx="3"/>
  <rect x="410" y="58" width="380" height="6" fill="#F0E8DC" opacity="0.5" rx="2"/>
  <!-- Text overlay -->
  <rect x="0" y="0" width="1200" height="750" fill="rgba(0,0,0,0.08)"/>
</svg>
