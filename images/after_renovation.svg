<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0EB"/>
      <stop offset="100%" stop-color="#E8E0D4"/>
    </linearGradient>
    <linearGradient id="wall2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#F5F0EB"/>
    </linearGradient>
    <linearGradient id="floor2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4BC8B"/>
      <stop offset="100%" stop-color="#C4A870"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#D4BC8B"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B8D4E3"/>
    </linearGradient>
  </defs>
  <!-- Room -->
  <rect width="1200" height="750" fill="url(#bg2)"/>
  <!-- Back wall -->
  <rect x="100" y="50" width="1000" height="450" fill="url(#wall2)" rx="4"/>
  <!-- Premium floor -->
  <path d="M0 500 L100 500 L1100 500 L1200 500 L1200 750 L0 750Z" fill="url(#floor2)"/>
  <!-- Floor herringbone pattern -->
  <g opacity="0.15">
    <path d="M100 520 L140 500 L180 520 L140 540Z" fill="#B8A060"/>
    <path d="M180 520 L220 500 L260 520 L220 540Z" fill="#B8A060"/>
    <path d="M260 520 L300 500 L340 520 L300 540Z" fill="#B8A060"/>
    <path d="M340 520 L380 500 L420 520 L380 540Z" fill="#B8A060"/>
    <path d="M420 520 L460 500 L500 520 L460 540Z" fill="#B8A060"/>
  </g>
  <!-- Large elegant window -->
  <rect x="400" y="80" width="400" height="300" fill="url(#sky)" rx="8"/>
  <rect x="396" y="76" width="408" height="308" fill="none" stroke="#C9A96E" stroke-width="4" rx="8"/>
  <line x1="600" y1="80" x2="600" y2="380" stroke="#C9A96E" stroke-width="3"/>
  <!-- Elegant curtains -->
  <path d="M380 70 Q395 200 385 400 L400 400 Q410 200 400 70Z" fill="#E8DCC8" opacity="0.7"/>
  <path d="M820 70 Q805 200 815 400 L800 400 Q790 200 800 70Z" fill="#E8DCC8" opacity="0.7"/>
  <!-- Designer sofa -->
  <rect x="130" y="370" width="380" height="100" fill="#E0D5C5" rx="16"/>
  <rect x="130" y="350" width="380" height="30" fill="#D4C8B5" rx="12"/>
  <!-- Sofa cushions -->
  <rect x="160" y="355" width="100" height="20" fill="#C9A96E" rx="10" opacity="0.4"/>
  <rect x="280" y="355" width="100" height="20" fill="#C9A96E" rx="10" opacity="0.4"/>
  <rect x="400" y="355" width="80" height="20" fill="#D4BC8B" rx="10" opacity="0.3"/>
  <!-- Elegant coffee table (marble) -->
  <rect x="550" y="420" width="200" height="60" fill="#FAFAFA" rx="8"/>
  <rect x="550" y="420" width="200" height="60" fill="url(#gold)" opacity="0.08" rx="8"/>
  <rect x="570" y="480" width="4" height="30" fill="#C9A96E" rx="2"/>
  <rect x="736" y="480" width="4" height="30" fill="#C9A96E" rx="2"/>
  <!-- Vase with flowers -->
  <rect x="630" y="395" width="20" height="25" fill="#C9A96E" rx="4"/>
  <circle cx="630" cy="388" r="8" fill="#8FB596"/>
  <circle cx="640" cy="385" r="6" fill="#A5C8A0"/>
  <circle cx="650" cy="390" r="7" fill="#7BA882"/>
  <!-- Statement pendant light -->
  <line x1="600" y1="0" x2="600" y2="100" stroke="#C9A96E" stroke-width="2"/>
  <circle cx="600" cy="115" r="25" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <circle cx="600" cy="115" r="15" fill="#FFF8E7" opacity="0.6"/>
  <!-- Wall art -->
  <rect x="180" y="120" width="120" height="160" fill="#F0E8DC" rx="4"/>
  <rect x="180" y="120" width="120" height="160" fill="none" stroke="#C9A96E" stroke-width="2" rx="4"/>
  <rect x="195" y="135" width="90" height="130" fill="#E8DCC8" rx="2"/>
  <!-- Side lamp -->
  <rect x="830" y="380" width="8" height="100" fill="#C9A96E" rx="2"/>
  <ellipse cx="834" cy="375" rx="30" ry="18" fill="#F5F0EB" stroke="#C9A96E" stroke-width="1.5"/>
  <circle cx="834" cy="375" r="6" fill="#FFF8E7" opacity="0.7"/>
  <!-- Plant -->
  <rect x="900" y="430" width="30" height="35" fill="#E0D5C5" rx="4"/>
  <circle cx="915" cy="415" r="18" fill="#7BA882" opacity="0.8"/>
  <circle cx="905" cy="420" r="14" fill="#8FB596" opacity="0.7"/>
  <circle cx="920" cy="408" r="12" fill="#A5C8A0" opacity="0.6"/>
  <!-- Area rug -->
  <rect x="200" y="530" width="500" height="100" fill="#C9A96E" opacity="0.15" rx="6"/>
  <rect x="210" y="540" width="480" height="80" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.2" rx="4"/>
  <!-- Warm light overlay -->
  <rect x="0" y="0" width="1200" height="750" fill="rgba(201,169,110,0.04)"/>
</svg>
